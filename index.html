<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bubble Tea Laden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <img src="images/logo.png" alt="Logo" class="logo-img" />
      <span class="logo-name">Bubble Tea Laden</span>
    </div>
    <div class="header-cart">
      <span class="cart-label" id="cart-total">0 Sachen</span>
    </div>
  </header>

  <main class="main">
    <div class="grid" id="grid">

      <div class="card" data-id="chocolate">
        <div class="card-image-wrap">
          <img src="images/chocolate.png" alt="Chocolate" class="card-img" />
        </div>
        <div class="card-footer">
          <span class="card-name">Chocolate Bubble Tea</span>
          <div class="card-controls">
            <button class="btn-qty btn-minus">&#8722;</button>
            <div class="qty-badge"><span class="qty-num">0</span></div>
            <button class="btn-qty btn-plus">&#43;</button>
          </div>
        </div>
      </div>

      <div class="card" data-id="blueberry">
        <div class="card-image-wrap">
          <img src="images/blueberry.png" alt="Blueberry" class="card-img" />
        </div>
        <div class="card-footer">
          <span class="card-name">Blueberry Bubble Tea</span>
          <div class="card-controls">
            <button class="btn-qty btn-minus">&#8722;</button>
            <div class="qty-badge"><span class="qty-num">0</span></div>
            <button class="btn-qty btn-plus">&#43;</button>
          </div>
        </div>
      </div>

      <div class="card" data-id="standard">
        <div class="card-image-wrap">
          <img src="images/standard.png" alt="Standard" class="card-img" />
        </div>
        <div class="card-footer">
          <span class="card-name">Standard Bubble Tea</span>
          <div class="card-controls">
            <button class="btn-qty btn-minus">&#8722;</button>
            <div class="qty-badge"><span class="qty-num">0</span></div>
            <button class="btn-qty btn-plus">&#43;</button>
          </div>
        </div>
      </div>

      <div class="card" data-id="banana">
        <div class="card-image-wrap">
          <img src="images/banana.png" alt="Banana" class="card-img" />
        </div>
        <div class="card-footer">
          <span class="card-name">Banana Bubble Tea</span>
          <div class="card-controls">
            <button class="btn-qty btn-minus">&#8722;</button>
            <div class="qty-badge"><span class="qty-num">0</span></div>
            <button class="btn-qty btn-plus">&#43;</button>
          </div>
        </div>
      </div>

      <div class="card" data-id="cherry">
        <div class="card-image-wrap">
          <img src="images/cherry.png" alt="Cherry" class="card-img" />
        </div>
        <div class="card-footer">
          <span class="card-name">Cherry Bubble Tea</span>
          <div class="card-controls">
            <button class="btn-qty btn-minus">&#8722;</button>
            <div class="qty-badge"><span class="qty-num">0</span></div>
            <button class="btn-qty btn-plus">&#43;</button>
          </div>
        </div>
      </div>

      <div class="card" data-id="coffee">
        <div class="card-image-wrap">
          <img src="images/coffee.png" alt="Coffee" class="card-img" />
        </div>
        <div class="card-footer">
          <span class="card-name">Coffee Bubble Tea</span>
          <div class="card-controls">
            <button class="btn-qty btn-minus">&#8722;</button>
            <div class="qty-badge"><span class="qty-num">0</span></div>
            <button class="btn-qty btn-plus">&#43;</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
